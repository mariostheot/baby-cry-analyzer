name: Build APK

# Builds a debug APK in the cloud so you never need Android Studio locally.
# After a run finishes: Actions -> this run -> Artifacts -> download "app-debug-apk",
# unzip, copy app-debug.apk to your phone and install it (allow "unknown sources").

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # Generate the wrapper jar so `gradle`/`./gradlew` both work (the binary jar is
      # intentionally not committed).
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
