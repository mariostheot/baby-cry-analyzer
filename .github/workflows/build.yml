name: Build APK

# Builds a debug APK in the cloud so you never need Android Studio locally.
# After a run finishes the APK is published two ways:
#  1) Actions -> this run -> Artifacts -> "app-debug-apk" (zip, needs unzip).
#  2) Repo -> Releases -> "latest" -> app-debug.apk (direct, tap to install on phone).
# Use (2) to download straight onto the phone without USB/Drive/email.
#
# Trained model: upload the Colab-produced `model_bundle.zip` once to a release tagged
# "model" (asset name `model_bundle.zip`). The build then bakes the .tflite files into the
# APK's assets. Without that release the APK still builds (app falls back to the heuristic).
#
# YAMNet: the feature extractor is (re)generated here from TF-Hub as a POOLED model with
# static outputs, pinned to TF 2.16 to match the app's TFLite/Flex runtime. This overrides
# whatever yamnet.tflite was in the bundle, so you don't need to re-run Colab to fix it.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # Generate the wrapper jar so this build uses the repository's pinned Gradle version.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      # Pull the trained model (uploaded once to the "model" release) into the APK assets,
      # so the app ships with the model and you only ever download the APK. Non-fatal: if
      # there is no "model" release yet, the app still builds and uses the heuristic.
      - name: Bundle trained model into assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p app/src/main/assets
          if gh release download model -p model_bundle.zip -O model_bundle.zip 2>/dev/null; then
            unzip -o model_bundle.zip -d _bundle
            for f in yamnet.tflite cry_reason.tflite cry_reason_trainable.tflite labels.txt metadata.json; do
              src="$(find _bundle -name "$f" -print -quit)"
              if [ -n "$src" ]; then cp "$src" "app/src/main/assets/$f"; echo "embedded $f"; else echo "WARN: $f missing from bundle"; fi
            done
            mkdir -p app/src/androidTest/assets
            for f in parity_sample.wav parity_expected.json; do
              src="$(find _bundle -name "$f" -print -quit)"
              if [ -n "$src" ]; then cp "$src" "app/src/androidTest/assets/$f"; echo "installed parity asset $f"; fi
            done
          else
            echo "WARN: no 'model' release found -> building APK without bundled models."
          fi
          echo "assets now contains:"; ls -la app/src/main/assets || true

      # Regenerate yamnet.tflite as a POOLED model with STATIC outputs. The raw per-frame
      # YAMNet has a dynamic output dimension that does not survive the Flex ops on-device
      # (reading it fails with "cannot fill a Java array ... Tensor of 0 bytes"). Pinning TF
      # 2.16 keeps the Flex ops compatible with the app's select-tf-ops runtime. Non-fatal:
      # if this fails the APK still builds with whatever yamnet.tflite the bundle provided.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate on-device YAMNet (pooled, static outputs)
        continue-on-error: true
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "tensorflow-cpu==2.16.*" "tensorflow-hub>=0.16" "tf-keras>=2.16,<2.17" "pyyaml>=6.0"
          python ml-training/tools/export_yamnet.py \
            --config ml-training/configs/default.yaml \
            --out app/src/main/assets/yamnet.tflite
          echo "regenerated yamnet.tflite:"; ls -la app/src/main/assets/yamnet.tflite

      # Use a STABLE debug signing key so every APK is signed identically. This lets the
      # phone install a new build straight over the old one (a normal update) WITHOUT
      # uninstalling, so personalization/history/profiles are preserved automatically.
      # The key lives only in the GitHub secret DEBUG_KEYSTORE_B64 (never committed).
      # Do not fall back to an ephemeral key: such an APK cannot update a previously signed
      # installation and would silently force an uninstall/data restore later.
      - name: Install stable debug signing key
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -z "$DEBUG_KEYSTORE_B64" ]; then
            echo "::error::Missing DEBUG_KEYSTORE_B64. Refusing to produce an APK that cannot update existing installs."
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/babycry-debug.keystore"
          printf '%s' "$DEBUG_KEYSTORE_B64" | base64 -d > "$KEYSTORE_PATH"
          keytool -list -keystore "$KEYSTORE_PATH" -storepass android >/dev/null
          KEY_ALIAS="$(keytool -list -v -keystore "$KEYSTORE_PATH" -storepass android | awk -F': ' '/Alias name:/{print $2; exit}')"
          SIGNING_SHA256="$(keytool -list -v -keystore "$KEYSTORE_PATH" -storepass android -alias "$KEY_ALIAS" | awk -F': ' '/SHA256:/{print $2; exit}')"
          if [ -z "$KEY_ALIAS" ] || [ -z "$SIGNING_SHA256" ]; then
            echo "::error::Could not read the stable keystore alias or SHA-256 certificate fingerprint."
            exit 1
          fi
          {
            echo "DEBUG_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "DEBUG_KEYSTORE_PASSWORD=android"
            echo "DEBUG_KEY_ALIAS=$KEY_ALIAS"
            echo "DEBUG_KEY_PASSWORD=android"
            echo "SIGNING_SHA256=$SIGNING_SHA256"
          } >> "$GITHUB_ENV"
          echo "Stable signing certificate SHA-256: $SIGNING_SHA256"

      # versionCode/versionName come from the CI run number so every build is a proper,
      # incrementing update (read by app/build.gradle.kts).
      - name: Build debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK signing certificate
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          APK_SHA256="$("$APKSIGNER" verify --print-certs "$APK" | awk -F': ' '/Signer #1 certificate SHA-256 digest:/{print $2; exit}')"
          echo "Expected stable signing certificate SHA-256: $SIGNING_SHA256"
          echo "Built APK signing certificate SHA-256: $APK_SHA256"
          if [ -z "$APK_SHA256" ] || [ "$APK_SHA256" != "$SIGNING_SHA256" ]; then
            echo "::error::APK certificate fingerprint does not match the stable signing keystore."
            exit 1
          fi
          echo "Verified APK signing certificate SHA-256: $APK_SHA256"

      - name: Run YAMNet parity test
        if: ${{ hashFiles('app/src/androidTest/assets/parity_sample.wav') != '' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish the APK as a "latest" GitHub Release asset so it can be downloaded
      # directly on the phone (browser -> repo -> Releases), without USB/Drive/email.
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "Latest debug APK" \
            --notes "Auto-built from ${{ github.sha }}. Tap app-debug.apk to download and install on your phone."
