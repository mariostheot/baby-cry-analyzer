name: Build APK

# Builds a debug APK in the cloud so you never need Android Studio locally.
# After a run finishes the APK is published two ways:
#  1) Actions -> this run -> Artifacts -> "app-debug-apk" (zip, needs unzip).
#  2) Repo -> Releases -> "latest" -> app-debug.apk (direct, tap to install on phone).
# Use (2) to download straight onto the phone without USB/Drive/email.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # Generate the wrapper jar so `gradle`/`./gradlew` both work (the binary jar is
      # intentionally not committed).
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish the APK as a "latest" GitHub Release asset so it can be downloaded
      # directly on the phone (browser -> repo -> Releases), without USB/Drive/email.
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "Latest debug APK" \
            --notes "Auto-built from ${{ github.sha }}. Tap app-debug.apk to download and install on your phone."
