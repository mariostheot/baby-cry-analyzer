name: Build APK

# Builds a debug APK in the cloud so you never need Android Studio locally.
# After a run finishes the APK is published two ways:
#  1) Actions -> this run -> Artifacts -> "app-debug-apk" (zip, needs unzip).
#  2) Repo -> Releases -> "latest" -> app-debug.apk (direct, tap to install on phone).
# Use (2) to download straight onto the phone without USB/Drive/email.
#
# Trained model: upload the Colab-produced `model_bundle.zip` once to a release tagged
# "model" (asset name `model_bundle.zip`). The build then bakes the .tflite files into the
# APK's assets. Without that release the APK still builds (app falls back to the heuristic).

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # Generate the wrapper jar so `gradle`/`./gradlew` both work (the binary jar is
      # intentionally not committed).
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      # Pull the trained model (uploaded once to the "model" release) into the APK assets,
      # so the app ships with the model and you only ever download the APK. Non-fatal: if
      # there is no "model" release yet, the app still builds and uses the heuristic.
      - name: Bundle trained model into assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p app/src/main/assets
          if gh release download model -p model_bundle.zip -O model_bundle.zip 2>/dev/null; then
            unzip -o model_bundle.zip -d _bundle
            for f in yamnet.tflite cry_reason.tflite cry_reason_trainable.tflite labels.txt; do
              src="$(find _bundle -name "$f" | head -n1)"
              if [ -n "$src" ]; then cp "$src" "app/src/main/assets/$f"; echo "embedded $f"; else echo "WARN: $f missing from bundle"; fi
            done
          else
            echo "WARN: no 'model' release found -> building APK without bundled models."
          fi
          echo "assets now contains:"; ls -la app/src/main/assets || true

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish the APK as a "latest" GitHub Release asset so it can be downloaded
      # directly on the phone (browser -> repo -> Releases), without USB/Drive/email.
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "Latest debug APK" \
            --notes "Auto-built from ${{ github.sha }}. Tap app-debug.apk to download and install on your phone."
